targets:
  $default:
    sources:
      - lib/**
      - assets/i18n/**
      - pubspec.yaml
      - $package$

    builders:
      auto_route_generator:auto_route_generator:
        enabled: true
      auto_route_generator:auto_router_generator:
        enabled: true
      flutter_gen_runner:
        options:
          output: lib/core/gen/
          line_length: 120
          integrations:
            image: true
            flutter_svg: true
            rive: true
            lottie: true