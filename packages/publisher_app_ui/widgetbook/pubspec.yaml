name: widgetbook_catalog
description: "Widgetbook catalog for Publisher App Ui"
publish_to: none
version: 1.0.0+1

environment:
  sdk: ^3.11.0
  flutter: ^3.41.0

dependencies:
  flutter:
    sdk: flutter
  # Localization
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  flutter_localized_locales: ^2.0.5
  ## Slang
  slang: ^4.15.0
  slang_flutter: ^4.15.0
  # Widgetbook
  widgetbook: ^3.23.0
  widgetbook_annotation: ^3.11.0

  publisher_app_ui:
    path: ..
dev_dependencies:
  build_runner: ^2.15.0
  flutter_test:
    sdk: flutter
  very_good_analysis: ^10.2.0
  widgetbook_generator: ^3.23.0

flutter:
  uses-material-design: true
