name: publisher_app
description: A Very Good Project created by Very Good CLI.
version: 1.0.0+1
publish_to: none

environment:
  sdk: ^3.12.2
  flutter: ^3.44.2

dependencies:
  flutter:
    sdk: flutter
  # Localization
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  flutter_localized_locales: ^2.0.5
  ## Slang
  slang: ^4.16.0
  slang_flutter: ^4.16.0


  # State Management
  bloc: ^9.2.1
  flutter_bloc: ^9.1.1
  hydrated_bloc: ^11.0.0
  bloc_concurrency: ^0.3.0
  stream_transform: ^2.1.1
  equatable: ^2.0.8

  # Path Provider
  path_provider: ^2.1.6
  path: ^1.9.1

  # Navigation
  auto_route: ^11.1.0

  # Injectable
  injectable: ^3.0.0
  get_it: ^9.2.1

  # Freezed
  freezed_annotation: ^3.1.0
  json_annotation: ^4.12.0

  # Core
  book_core:
    path: ../../packages/book_core
  book_exporters:
    path: ../../packages/book_exporters
  publisher_app_ui:
    path: ../../packages/publisher_app_ui
  # Utilities
  flutter_markdown_plus: ^1.0.7
  file_picker: ^11.0.2
  printing: ^5.15.0
  sizer: ^3.1.3
  responsive_framework: ^1.5.1

  # OS
  enhanced_platform_menu: ^0.3.1
  window_manager: ^0.5.1

dev_dependencies:
  # Test
  flutter_test:
    sdk: flutter
  bloc_test: ^10.0.0
  mocktail: ^1.0.5

  # Lint
  bloc_lint: ^0.4.1
  very_good_analysis: ^10.2.0

  # Code generation
  build_runner: ^2.15.0
  # slang_build_runner: ^4.14.0
  injectable_generator: ^3.0.2
  freezed: ^3.2.5
  json_serializable: ^6.13.1

  # Auto Route
  auto_route_generator: ^10.5.0

  # Tools
  bloc_tools: ^0.1.0-dev.24

flutter:
  uses-material-design: true