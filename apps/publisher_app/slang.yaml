base_locale: en
fallback_strategy: base_locale
input_directory: assets/i18n
input_file_pattern: .i18n.json
output_directory: lib/core/i18n
output_file_name: translations.g.dart
lazy: false
locale_handling: true
flutter_integration: true
namespaces: true
translate_var: t
enum_name: AppLocale
class_name: Translations
translation_class_visibility: private
key_case: camel
key_map_case: null
param_case: camel

sanitization:
  enabled: true
  prefix: k
  case: camel

string_interpolation: dart
flat_map: false
translation_overrides: false
timestamp: true
statistics: true

pluralization:
  auto: cardinal
  default_parameter: n

obfuscation:
  enabled: false

format:
  enabled: true
  width: 120

autodoc:
  enabled: true
  locales:
    - en
    - ar

generate_enum: true